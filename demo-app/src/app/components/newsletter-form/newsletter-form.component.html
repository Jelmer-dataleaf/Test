<div class="newsletter-page" data-testid="newsletter-page">
  <h2>Newsletter</h2>
  <p class="subtitle">Get the latest updates straight to your inbox.</p>

  <div *ngIf="submitted" class="success-banner" data-testid="success-banner">
    You're subscribed! 🎉
    <button (click)="reset()" data-testid="reset-btn">Subscribe another</button>
  </div>

  <form
    *ngIf="!submitted"
    [formGroup]="form"
    (ngSubmit)="submit()"
    novalidate
    data-testid="newsletter-form"
  >
    <div class="field">
      <label for="firstName">First Name</label>
      <input
        id="firstName"
        type="text"
        formControlName="firstName"
        placeholder="Jane"
        data-testid="input-firstName"
      />
      <span
        class="error"
        *ngIf="firstName.invalid && firstName.touched"
        data-testid="error-firstName"
      >
        First name is required.
      </span>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="jane@example.com"
        data-testid="input-email"
      />
      <span class="error" *ngIf="email.invalid && email.touched" data-testid="error-email">
        <span *ngIf="email.errors?.['required']">Email is required.</span>
        <span *ngIf="email.errors?.['email']">Enter a valid email address.</span>
      </span>
    </div>

    <button type="submit" data-testid="submit-btn">Subscribe</button>
  </form>
</div>
